services:
  - type: web
    name: red-salud-san-pablo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python Portada.py
    envVars:
      - key: RENDER
        value: "true"
      - key: PORT
        value: "10000"
    disk:
      name: data-disk
      mountPath: /opt/render/project/src/data
      sizeGB: 1
