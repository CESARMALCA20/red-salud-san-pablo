services:
  - type: web
    name: red-salud-san-pablo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app_render.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false --theme.base light
    envVars:
      - key: RENDER
        value: "true"
